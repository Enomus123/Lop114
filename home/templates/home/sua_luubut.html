<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa Kỷ Niệm</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: #ffffff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 5px solid #2b7a78; }
        .form-control { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Quicksand', sans-serif; font-size: 1rem; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #2b7a78; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .cancel-btn { display: block; text-align: center; margin-top: 15px; color: #e74c3c; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 style="text-align: center; color: #2b7a78;"><i class="fas fa-pen"></i> Chỉnh Sửa Kỷ Niệm</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="text" name="ho_ten" class="form-control" value="{{ note.ho_ten }}" required>
            <textarea name="noi_dung" class="form-control" rows="5" required>{{ note.noi_dung }}</textarea>
            
            <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #2b7a78; font-size: 0.9rem;">
                <i class="fas fa-image"></i> Thay đổi hình ảnh mới từ máy (nếu có):
            </label>
            <input type="file" name="hinh_anh" class="form-control" accept="image/*" style="padding: 8px; margin-bottom: 20px;">
            
            <button type="submit" class="submit-btn"><i class="fas fa-save"></i> Lưu Thay Đổi</button>
            <a href="{% url 'luu_but_page' %}" class="cancel-btn">Hủy bỏ</a>
        </form>
    </div>
</body>
</html>
